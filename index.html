<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./main.css" />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main class="flex">
      <div class="card">
        <img
          src="./assets/images/illustration-article.svg"
          alt="illustration for blog website"
          class="box-image"
        />
        <div class="content">
          <div class="learning">Learning</div>
          <div class="publish-date">Published 21 Dec 2023</div>
          <h1 class="blog-title">HTML & CSS foundations</h1>

          <p class="blog-desc">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <div class="author">
          <img
            src="./assets/images/image-avatar.webp"
            alt="profile picture for greg hooper"
            class="author-img"
          />
          <span class="author-name"> Greg Hooper </span>
        </div>
      </div>
    </main>
    <footer>
      <div class="attribution">
        Challenge by
        <a
          href="https://www.frontendmentor.io?ref=challenge"
          target="_blank"
          rel="noopener"
          >Frontend Mentor</a
        >. Coded by
        <a href="https://www.kylecor.win/" target="_blank" rel="noopener"
          >Kyle Corwin</a
        >.
      </div>
    </footer>
  </body>
</html>
